# @package _global_

defaults:
  - _self_
  - data@eval_data: eval
  - model: deepfont
  - logger: null # set logger here or use command line (e.g. `python eval.py logger=tensorboard`)
  - trainer: finetune
  - paths: default
  - hydra: default

  # optional local config for machine/user specific settings
  - optional local: default

task_name: "eval"

tags: ["eval"]

# path to a finetuned DeepFont checkpoint to evaluate
ckpt_path: "${paths.root_dir}/.checkpoints/best_deepfont.ckpt"
