# @package _global_

# Finetune smoke test -- minimal CPU run for pipeline verification.
# Usage: python scripts/finetune.py experiment=finetune_smoke_test

defaults:
  - override /data: finetune
  - override /data@eval_data: eval
  - override /model: deepfont
  - override /trainer: finetune

task_name: "finetune_smoke_test"
tags: ["smoke_test"]

# Data: no augmentation
data:
  aug_prob: 0.0

# Eval: minimal crops for speed
eval_data:
  num_image_crops: 2

# Trainer: minimal run
trainer:
  accelerator: "cpu"
  devices: 1
  max_epochs: 2
  batch_size: 4
  val_batch_size: 4
  num_workers: 0
  seed: 42
  log_every_n_steps: 1
  val_frequency: 1
  checkpoint_frequency: 1
  limit_train_batches: 5
  limit_val_batches: 5
  limit_eval_batches: 5

train: true
test: true
