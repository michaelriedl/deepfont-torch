# Configuration for FinetuneConfig.
# Trainer settings for the DeepFont supervised fine-tuning stage.
# Override hardware settings via CLI, e.g.:
#   python finetune.py trainer.accelerator=gpu trainer.devices=4 trainer.strategy=ddp

_target_: deepfont.trainer.config.FinetuneConfig

# Hardware / Fabric
accelerator: "auto"
devices: "auto"
strategy: "auto"
precision: "32-true"
num_workers: 4

# Training loop
max_epochs: 100
batch_size: 128
val_batch_size: 128
train_ratio: 0.8
grad_accum_steps: 1
gradient_clip_val: null
limit_train_batches: null  # cap training batches per epoch; null = use all
limit_val_batches: null  # cap validation batches per epoch; null = use all

# Validation
val_frequency: 1

# Checkpointing
checkpoint_dir: "${paths.output_dir}/checkpoints"
checkpoint_frequency: 1

# Logging
log_every_n_steps: 10

# Reproducibility
seed: 0

# --- Finetune-specific ---

# Trainer-level data handling
num_images_to_cache: 0

# Transfer learning
encoder_weights_path: "${paths.root_dir}/.checkpoints/best_ae.ckpt"

# Optimizer
optimizer_type: "sgd"  # "sgd" | "adam" | "adamw"
learning_rate: 0.01  # paper: "We start with the learning rate at 0.01"
weight_decay: 0.0005  # paper: "weight decay of 0.0005"
optimizer_kwargs:
  momentum: 0.9  # paper: "momentum of 0.9"
  # adam/adamw:  betas: [0.9, 0.999]  eps: 1.0e-8

# LR Scheduler (optional)
# Paper: "manually divide the learning rate by 10 when the validation error rate stops decreasing"
scheduler_type: "reduce_on_plateau"
scheduler_kwargs:
  factor: 0.1   # divide by 10
  patience: 5   # epochs to wait before reducing (paper does not specify)

# Evaluation
limit_eval_batches: null  # cap evaluation batches in evaluate(); null = use all
