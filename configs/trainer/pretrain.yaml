# Configuration for PretrainConfig.
# Trainer settings for the DeepFont autoencoder pretraining stage.
# Override hardware settings via CLI, e.g.:
#   python pretrain.py trainer.accelerator=gpu trainer.devices=4 trainer.strategy=ddp

_target_: deepfont.trainer.config.PretrainConfig

# Hardware / Fabric
accelerator: "auto"
devices: "auto"
strategy: "auto"
precision: "32-true"
num_workers: 4

# Training loop
max_epochs: 100
batch_size: 64
val_batch_size: 64
train_ratio: 0.8
grad_accum_steps: 1
gradient_clip_val: null
limit_train_batches: null  # cap training batches per epoch; null = use all
limit_val_batches: null  # cap validation batches per epoch; null = use all

# Validation
val_frequency: 1

# Checkpointing
checkpoint_dir: "${paths.output_dir}/checkpoints"
checkpoint_frequency: 1

# Logging
log_every_n_steps: 10

# Reproducibility
seed: null

# --- Pretrain-specific ---

# Trainer-level data handling
upsample_real_images: true
num_images_to_cache: 0

# Optimizer
learning_rate: 1e-3
weight_decay: 0.0

# LR Scheduler (optional)
scheduler_type: null  # "cosine" | "step" | "reduce_on_plateau" | "linear"
scheduler_kwargs: {}

# Loss
reconstruction_loss: "mse"  # "mse" | "l1"
